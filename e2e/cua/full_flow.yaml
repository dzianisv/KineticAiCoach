name: full_flow
package: com.aistudio.aicoach.vtzrkm
# PRD v2 end-to-end journey, driven entirely through the guest (Firebase
# anonymous) path so it runs on an emulator with no Google Play Services.
# Flow: guest login -> conversational coach onboarding (height/weight/goal/days)
# -> program built -> Start today's class -> simulated multi-exercise workout
# -> end-of-class results table -> back on dashboard/history.
goal: >
  You are testing the "AI Coach" fitness Android app end to end. Follow these
  steps in order, looking at each screenshot before acting. Be patient: after
  taps that trigger network or navigation, wait a few seconds for the next
  screen.

  IMPORTANT: If at any point a SYSTEM dialog appears titled "System UI isn't
  responding", "Launcher isn't responding", or any "... isn't responding" /
  "Application not responding" dialog, tap the "Wait" button to dismiss it and
  continue. That is a transient emulator hiccup, not an app failure. Only an
  "AI Coach keeps stopping" / "aicoach has stopped" app-crash dialog is a real
  failure.

  1. LOGIN: The app opens on a login screen with the title "AI COACH", a "Sign
     in with Google" button, and a "Continue as Guest" button. Tap "Continue as
     Guest" (the outlined/secondary button, NOT the Google button). Wait for
     Firebase anonymous sign-in.

  2. COACH ONBOARDING CHAT: A chat screen appears where an AI coach asks you
     questions to build a program. When the coach asks for your HEIGHT, tap the
     text input at the bottom, type "175 cm", and send. When it asks for your
     WEIGHT, type "70 kg" and send. When it asks about your GOALS, type "build
     muscle and get fit" and send. When it asks how many DAYS per week you can
     train, type "3 days" and send. Answer whatever the coach asks with a short
     sensible reply; always use the text box and the send button. Wait after
     each send for the coach to reply.

  3. PROGRAM READY: The coach says the program is ready (you may see a list of
     exercises). Tap the button that continues to the app (labelled something
     like "Program ready", "Start", "Let's go", "Done", or "Continue"). You
     should land on a dashboard/home screen.

  4. START CLASS: On the dashboard, find and tap the "Start today's class"
     button.

  5. WORKOUT: A workout screen shows the current exercise name and a rep counter
     that increases on its own over a few seconds (a simulated live workout).
     Wait ~5 seconds for reps to count up, then tap the button to finish the set
     and move on (labelled like "Next exercise", "Set done", "Next", or
     "Finish"). Repeat this for every exercise in the class until no more remain.

  6. RESULTS: After you finish the LAST exercise, a results screen titled
     "Class Complete!" appears with a table listing each exercise and its
     reps / form score / points plus a TOTAL row. The MOMENT you see the words
     "Class Complete!", the test is done: report TEST_PASSED immediately and take
     NO further action. Do NOT tap "Done", do NOT tap the bottom navigation, do
     NOT start another class.

  Report TEST_PASSED as soon as the "Class Complete!" results table is visible,
  having gone through login, onboarding chat, and all workout exercises. Never
  tap anything once "Class Complete!" is on screen.
successCriteria:
  - Tapped "Continue as Guest" and left the login screen
  - Answered the coach's onboarding questions in the chat and a program was built
  - Tapped "Start today's class" and went through the workout exercises
  - The "Class Complete!" end-of-class results table (per-exercise reps/form/
    points with a TOTAL row) was shown and left visible
failureCriteria:
  - The AI Coach app itself crashes with an app dialog such as "AI Coach keeps
    stopping" or "aicoach has stopped" (a system "isn't responding" dialog is
    NOT an app failure — dismiss it with "Wait" and continue)
  - The flow gets stuck on the login screen after tapping "Continue as Guest"
  - The onboarding chat never accepts input or never produces a program
  - The Start today's class button cannot be found or does nothing
  - Only a blank white/black screen is shown with no UI
verification:
  prompt: >
    Look at this screenshot from the AI Coach Android app, taken at the END of an
    automated end-to-end test that logged in as guest, completed a chat
    onboarding, and ran a multi-exercise workout class. Answer strictly YES or
    NO: Does the screenshot show an end-of-class results/summary screen — a
    "Class Complete!" heading and/or a table listing exercises with reps, a form
    score, or points and a TOTAL row? A login screen, a mid-workout exercise
    screen, a plain dashboard, a blank screen, or a crash dialog counts as NO.
    Answer YES or NO, then one sentence of evidence.
maxSteps: 60
