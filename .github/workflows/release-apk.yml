name: release-apk

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build and upload the APK to"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-signed-apk:
    name: Build & attach signed release APK
    runs-on: ubuntu-latest
    env:
      # Resolve the release tag from either trigger.
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set — cannot produce a signed APK."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/upload-keystore.jks"

      - name: Build signed release APK
        env:
          # Wired to app/build.gradle.kts release signingConfig (env-var fallback).
          KEYSTORE_PATH: ${{ runner.temp }}/upload-keystore.jks
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Locate signed APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" ! -name "*unsigned*" | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No signed release APK found."
            find app/build/outputs/apk -type f -name "*.apk" || true
            exit 1
          fi
          echo "Found APK: $APK"
          echo "path=$APK" >> "$GITHUB_OUTPUT"

      - name: Verify APK is signed
        run: |
          APK="${{ steps.apk.outputs.path }}"
          BT=$(ls "$ANDROID_HOME"/build-tools/ | sort -V | tail -1)
          "$ANDROID_HOME/build-tools/$BT/apksigner" verify --verbose "$APK"

      - name: Upload APK to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK="${{ steps.apk.outputs.path }}"
          STABLE="$RUNNER_TEMP/kinetic-ai-coach.apk"
          VERSIONED="$RUNNER_TEMP/kinetic-ai-coach-${RELEASE_TAG}.apk"
          cp "$APK" "$STABLE"
          cp "$APK" "$VERSIONED"
          gh release upload "$RELEASE_TAG" "$STABLE" --clobber -R "$GITHUB_REPOSITORY"
          gh release upload "$RELEASE_TAG" "$VERSIONED" --clobber -R "$GITHUB_REPOSITORY"
