name: _validate-apk-temp
on:
  push:
    branches: [ci/release-apk]
permissions:
  contents: write
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          test -n "$KEYSTORE_BASE64" || { echo "::error::KEYSTORE_BASE64 missing"; exit 1; }
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/upload-keystore.jks"
      - name: Build signed release APK
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/upload-keystore.jks
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew --no-daemon :app:assembleRelease
      - name: Locate + verify signed APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" ! -name "*unsigned*" | head -1)
          test -n "$APK" || { echo "::error::no signed apk"; exit 1; }
          BT=$(ls "$ANDROID_HOME"/build-tools/ | sort -V | tail -1)
          "$ANDROID_HOME/build-tools/$BT/apksigner" verify --verbose "$APK"
          echo "path=$APK" >> "$GITHUB_OUTPUT"
      - name: Upload to test release (validate CDN path)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK="${{ steps.apk.outputs.path }}"
          cp "$APK" "$RUNNER_TEMP/kinetic-ai-coach.apk"
          gh release upload v0.0.0-citest "$RUNNER_TEMP/kinetic-ai-coach.apk" --clobber -R "$GITHUB_REPOSITORY"
