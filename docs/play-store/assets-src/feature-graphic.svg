    <circle cx="146" cy="214" r="5"/>
    <circle cx="88" cy="238" r="5"/>
    <circle cx="160" cy="238" r="5"/>
    <circle cx="107" cy="278" r="5"/>
    <circle cx="141" cy="278" r="5"/>
    <circle cx="103" cy="316" r="5"/>
    <circle cx="145" cy="316" r="5"/>
